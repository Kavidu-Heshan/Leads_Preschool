services:
  # Backend API Service only
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leads_preschool_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URI: "mongodb+srv://kavindupremasiri272:Kavidu%232006@event.aqbxful.mongodb.net/Preschool"
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  preschool_network:
    driver: bridge